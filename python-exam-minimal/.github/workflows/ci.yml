name: Python CI

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: python-exam-minimal

jobs:
  quality:
    name: CI (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]      # 축 1: OS
        python-version: ['3.10', '3.11']         # 축 2: Python 버전

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'                                        # 캐시 최적화
          cache-dependency-path: python-exam-minimal/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (ruff)                                    # 품질 게이트 1
        run: ruff check .

      - name: Test (pytest)                                  # 품질 게이트 2
        run: pytest tests/ -v --tb=short --junit-xml=test-results.xml

      - name: Build gate                                     # 품질 게이트 3
        run: python -c "from app.main import app; print('Build OK')"

      - name: Upload test results                            # 실패 원인 아티팩트
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-py${{ matrix.python-version }}
          path: python-exam-minimal/test-results.xml
